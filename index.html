<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Axel Karlsson — Developer portfolio" />
        <title>Axel Karlsson</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/layout.css" />
        <link rel="stylesheet" href="css/components.css" />

        <script>
            (function () {
                var t = localStorage.getItem("axel-portfolio-theme");
                if (t) document.documentElement.dataset.theme = t;
            })();
        </script>
    </head>
    <body>
        <div class="page">
            <header class="page-header">
                <nav aria-label="Theme">
                    <div id="theme-switcher" class="theme-switcher" role="group" aria-label="Choose theme"></div>
                </nav>
            </header>

            <main class="page-main">
                <section class="hero section" aria-labelledby="hero-name">
                    <h1 id="hero-name" class="hero-name">Axel Karlsson</h1>
                    <p id="hero-tagline" class="hero-tagline"></p>
                    <div id="hero-meta" class="hero-meta"></div>
                    <nav id="social-links" class="social-links" aria-label="Social links"></nav>
                </section>

                <section class="section" id="github" aria-labelledby="github-heading">
                    <header class="section-header">
                        <h2 id="github-heading" class="section-title">GitHub</h2>
                        <p class="section-subtitle">Recent open source work</p>
                    </header>
                    <div id="github-profile"></div>
                    <div id="github-repos" style="margin-top: var(--space-6)"></div>
                </section>

                <section class="section" id="connect" aria-labelledby="connect-heading">
                    <header class="section-header">
                        <h2 id="connect-heading" class="section-title">Connect</h2>
                        <p class="section-subtitle">Find me elsewhere on the web</p>
                    </header>
                    <div class="profile-card">
                        <div class="profile-info">
                            <p class="profile-name">Axel Karlsson</p>
                            <p class="profile-bio">
                                Open to conversations about software, accessibility, and developer tooling. Reach out
                                via LinkedIn or email.
                            </p>
                            <div class="social-links" style="margin-top: var(--space-4); justify-content: flex-start">
                                <a
                                    class="social-link"
                                    href="https://github.com/klovaaxel"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                >
                                    GitHub
                                </a>
                                <a
                                    class="social-link"
                                    href="https://www.linkedin.com/in/axel-karlsson"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                >
                                    LinkedIn
                                </a>
                                <a class="social-link" href="mailto:klovakarlsson@gmail.com">Email</a>
                            </div>
                        </div>
                    </div>
                </section>
            </main>

            <footer class="page-footer">
                <p class="footer-text">© <span id="footer-year"></span> Axel Karlsson</p>
            </footer>
        </div>

        <script type="module" src="js/main.js"></script>
    </body>
</html>
