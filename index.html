<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Axel Karlsson — AI Engineer at Hogia" />
        <title>Axel Karlsson</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/layout.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/animations.css" />

        <script>
            (function () {
                var t = localStorage.getItem("axel-portfolio-theme");
                if (t) document.documentElement.dataset.theme = t;
            })();
        </script>
    </head>
    <body>
        <div class="page">
            <header class="page-header">
                <nav aria-label="Theme">
                    <div id="theme-switcher" class="theme-switcher" role="group" aria-label="Choose theme"></div>
                </nav>
            </header>

            <main class="page-main">
                <section class="hero section" aria-labelledby="hero-name">
                    <h1 id="hero-name" class="hero-name">Axel Karlsson</h1>
                    <p id="hero-tagline" class="hero-tagline"></p>
                    <div id="hero-meta" class="hero-meta"></div>
                    <nav id="social-links" class="social-links" aria-label="Social links"></nav>
                </section>

                <section
                    class="section"
                    id="about"
                    aria-labelledby="about-heading"
                    data-reveal="slide-left"
                >
                    <header class="section-header">
                        <h2 id="about-heading" class="section-title">About</h2>
                    </header>
                    <p id="about-text" class="about-text"></p>
                    <ul id="skills-list" class="skills-list" aria-label="Skills" data-stagger="skills"></ul>
                </section>

                <section
                    class="section"
                    id="experience"
                    aria-labelledby="experience-heading"
                    data-reveal="slide-right"
                >
                    <header class="section-header">
                        <h2 id="experience-heading" class="section-title">Experience</h2>
                        <p class="section-subtitle">Work and education</p>
                    </header>
                    <ol id="experience-list" class="timeline" data-stagger="timeline"></ol>
                </section>

                <section
                    class="section"
                    id="github"
                    aria-labelledby="github-heading"
                    data-reveal="sweep-up"
                >
                    <header class="section-header">
                        <h2 id="github-heading" class="section-title">GitHub</h2>
                        <p class="section-subtitle">Activity and contributions</p>
                    </header>
                    <div id="github-dashboard"></div>
                </section>

                <section
                    class="section"
                    id="connect"
                    aria-labelledby="connect-heading"
                    data-reveal="flip"
                >
                    <header class="section-header">
                        <h2 id="connect-heading" class="section-title">Connect</h2>
                        <p class="section-subtitle">Find me elsewhere on the web</p>
                    </header>
                    <div class="profile-card">
                        <div class="profile-info">
                            <p id="connect-name" class="profile-name">Axel Karlsson</p>
                            <p id="connect-bio" class="profile-bio"></p>
                            <nav
                                id="connect-social-links"
                                class="social-links connect-social-links"
                                aria-label="Contact links"
                            ></nav>
                        </div>
                    </div>
                </section>
            </main>

            <footer class="page-footer">
                <p class="footer-text">© <span id="footer-year"></span> Axel Karlsson</p>
            </footer>
        </div>

        <script type="module" src="js/main.js"></script>
    </body>
</html>
